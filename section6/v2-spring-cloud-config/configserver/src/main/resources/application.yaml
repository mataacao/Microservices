server:
  port: 8071

spring:
  application:
    name: configserver
  profiles:
    #    active: native
    active: git
  cloud:
    config:
      server:
        git:
          uri: https://github.com/mataacao/crazybytes-config.git
          username: ${GIT_USERNAME}
          password: ${GIT_TOKEN}
          default-label: main
          timeout: 5
          clone-on-start: true
          force-pull: true
          skipSslValidation: true
  #        native:
  #         search-locations: "file:///D:/OneDrive - bsp.gov.ph/Documents/ECMS/microservices/section6/v2-spring-cloud-config/configserver/src/main/resources/config"
  #         search-locations: "classpath:/config"
  rabbitmq:
    host: rabbit
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include:
          - "*"
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoint:
      health:
        probes:
          enabled: true
