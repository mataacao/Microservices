services:
  accounts:
    image: "alexjohn31/accounts:s4"
    container_name: accounts-ms
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - crazybank
  loan:
    image: "alexjohn31/loan:s4"
    container_name: loan-ms
    ports:
      - "8090:8090"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - crazybank
  card:
    image: "alexjohn31/card:s4"
    container_name: card-ms
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - crazybank
networks:
  crazybank:
    driver: "bridge"